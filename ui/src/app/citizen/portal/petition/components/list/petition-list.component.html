<div class="petition-container">
  <!-- Header -->
  <div class="header-section">
    <h1>Petitions</h1>
    <button class="btn-add" (click)="openModal()">
      + Create Petition
    </button>
  </div>

  <!-- Success/Error Messages -->
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>

  <!-- Petitions List -->
  <div class="list-section">
    <div *ngIf="items.length === 0" class="no-data">
      No petitions available.
    </div>

    <table *ngIf="items.length > 0" class="items-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Target Authority</th>
          <th>Status</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of items">
          <td>{{ item.title }}</td>
          <td>{{ item.targetAuthority }}</td>
          <td>
            <span *ngIf="item.isApproved" class="badge badge-success">✓ Approved</span>
            <span *ngIf="!item.isApproved" class="badge badge-pending">⏳ Pending</span>
          </td>
          <td>{{ item.createdAt | date:'short' }}</td>
          <td>
            <button class="btn-sm btn-view" (click)="onView(item)">View</button>
            <button *ngIf="!item.isApproved" class="btn-sm btn-edit" (click)="onEdit(item)">Edit</button>
            <button *ngIf="!item.isApproved" class="btn-sm btn-delete" (click)="onDelete(item.id || item._id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal Form -->
  <div *ngIf="showModal" class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ isEditing ? 'Edit Petition' : 'Create New Petition' }}</h2>
        <button class="btn-close" (click)="closeModal()">&times;</button>
      </div>

      <app-petition-form
        [data]="currentData"
        [isEditing]="isEditing"
        [successMessage]="successMessage"
        [errorMessage]="errorMessage"
        [showModal]="showModal"
        (submit)="onFormSubmit($event)"
        (close)="closeModal()"
      ></app-petition-form>
    </div>
  </div>

  <!-- Confirm Delete Dialog -->
  <app-confirm-dialog
    [isVisible]="showConfirmDialog"
    [title]="confirmDialogTitle"
    [message]="confirmDialogMessage"
    confirmText="Delete"
    cancelText="Cancel"
    [isLoading]="isDeleting"
    [isDangerous]="true"
    (confirm)="onConfirmDelete()"
    (cancel)="onCancelDelete()"
  ></app-confirm-dialog>

  <!-- View Modal -->
  <app-view-modal
    [isVisible]="showViewModal"
    [title]="viewModalTitle"
    [data]="viewModalData"
    [fields]="viewModalFields"
    (close)="onCloseViewModal()"
  ></app-view-modal>
</div>
