<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full max-h-screen overflow-y-auto">
    <!-- Modal Header -->
    <div class="bg-linear-to-r from-blue-500 to-purple-600 px-6 py-4">
      <div class="flex justify-between items-start gap-4">
        <div>
          <h2 class="text-xl font-bold text-white mb-1">Cast Your Vote</h2>
          <p class="text-blue-100 text-sm">{{ vote.title }}</p>
        </div>
        <button
          (click)="onClose()"
          class="text-white hover:text-blue-100 transition-colors"
          aria-label="Close modal"
        >
          ✕
        </button>
      </div>
    </div>

    <!-- Modal Body -->
    <div class="p-6 space-y-6">
      <!-- Alert Messages -->
      <div *ngIf="errorMessage" class="bg-red-100 text-red-800 border-l-4 border-red-500 px-4 py-3 rounded dark:bg-red-900/20 dark:text-red-300 dark:border-red-600">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="bg-green-100 text-green-800 border-l-4 border-green-500 px-4 py-3 rounded dark:bg-green-900/20 dark:text-green-300 dark:border-green-600">
        {{ successMessage }}
      </div>

      <!-- Vote Description -->
      <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-lg text-sm text-gray-700 dark:text-gray-300">
        {{ vote.description }}
      </div>

      <!-- Vote Options -->
      <div class="space-y-3">
        <p class="font-semibold text-gray-800 dark:text-gray-100">How do you vote?</p>
        
        <!-- Yes Option -->
        <button
          (click)="selectVote('yes')"
          [ngClass]="{
            'ring-2 ring-green-500 bg-green-50 dark:bg-green-900/20': voteValue === 'yes',
            'bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600': voteValue !== 'yes'
          }"
          class="w-full p-4 rounded-lg text-left transition-all font-semibold text-lg"
        >
          <div class="flex items-center gap-3">
            <div class="w-6 h-6 rounded-full flex items-center justify-center" 
                 [ngClass]="voteValue === 'yes' ? 'bg-green-500 text-white' : 'bg-gray-300 dark:bg-gray-600'">
              <span *ngIf="voteValue === 'yes'">✓</span>
            </div>
            <span [ngClass]="voteValue === 'yes' ? 'text-green-700 dark:text-green-300' : 'text-gray-700 dark:text-gray-300'">
              Yes - I support this
            </span>
          </div>
        </button>

        <!-- No Option -->
        <button
          (click)="selectVote('no')"
          [ngClass]="{
            'ring-2 ring-red-500 bg-red-50 dark:bg-red-900/20': voteValue === 'no',
            'bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600': voteValue !== 'no'
          }"
          class="w-full p-4 rounded-lg text-left transition-all font-semibold text-lg"
        >
          <div class="flex items-center gap-3">
            <div class="w-6 h-6 rounded-full flex items-center justify-center" 
                 [ngClass]="voteValue === 'no' ? 'bg-red-500 text-white' : 'bg-gray-300 dark:bg-gray-600'">
              <span *ngIf="voteValue === 'no'">✓</span>
            </div>
            <span [ngClass]="voteValue === 'no' ? 'text-red-700 dark:text-red-300' : 'text-gray-700 dark:text-gray-300'">
              No - I do not support this
            </span>
          </div>
        </button>
      </div>

      <!-- Reason (Optional) -->
      <div>
        <label for="reason" class="block text-sm font-semibold text-gray-800 dark:text-gray-100 mb-2">
          Reason for your vote (optional)
        </label>
        <textarea
          id="reason"
          [(ngModel)]="reason"
          placeholder="Share your thoughts about this vote..."
          maxlength="500"
          rows="4"
          class="w-full px-3 py-2 border-2 border-gray-300 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 dark:border-gray-600 dark:focus:ring-blue-900 resize-none"
        ></textarea>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
          {{ reason.length }}/500 characters
        </p>
      </div>

      <!-- User Info Confirmation -->
      <div class="bg-gray-100 dark:bg-gray-700 p-4 rounded-lg text-sm">
        <p class="text-gray-700 dark:text-gray-300 mb-2">
          <strong>You are voting as:</strong>
        </p>
        <div class="space-y-1 text-gray-600 dark:text-gray-400">
          <p>📧 {{ currentUser?.email }}</p>
          <p>👤 {{ currentUser?.username }}</p>
          <p>📍 {{ currentUser?.ward }}, {{ currentUser?.subCounty }}</p>
        </div>
      </div>
    </div>

    <!-- Modal Footer -->
    <div class="px-6 py-4 bg-gray-50 dark:bg-gray-700 border-t border-gray-200 dark:border-gray-600 flex gap-3 justify-end">
      <button
        (click)="onClose()"
        [disabled]="isSubmitting"
        class="px-4 py-2 bg-white hover:bg-gray-50 text-gray-700 font-semibold rounded-lg border border-gray-300 disabled:opacity-60 disabled:cursor-not-allowed transition-all dark:bg-gray-800 dark:hover:bg-gray-700 dark:text-gray-200 dark:border-gray-600"
      >
        Cancel
      </button>
      <button
        (click)="onSubmit()"
        [disabled]="isSubmitting || !voteValue"
        class="px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-lg disabled:opacity-60 disabled:cursor-not-allowed transition-all"
      >
        <span *ngIf="!isSubmitting">Submit Vote</span>
        <span *ngIf="isSubmitting">Processing...</span>
      </button>
    </div>
  </div>
</div>
