<div class="w-full">
  <h1 class="text-lg sm:text-xl md:text-2xl font-bold text-gray-800 dark:text-gray-200 mb-3 sm:mb-4">📝 Blog Management</h1>

  <!-- Error & Status -->
  <div *ngIf="error" class="bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 px-4 py-2 rounded mb-4">
    {{ error }}
  </div>

  <!-- Blog Form -->
  <form [formGroup]="blogForm" (ngSubmit)="onSubmit()" class="bg-white dark:bg-gray-800 rounded-lg shadow-sm p-3 sm:p-4 mb-4 sm:mb-6 border border-gray-200 dark:border-gray-700">
    <h2 class="text-lg font-semibold text-gray-700 dark:text-gray-200 mb-4">
      {{ editingBlogId ? ' Edit Blog' : ' Add New Blog' }}
    </h2>

    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300">Title</label>
        <input
          formControlName="title"
          type="text"
          class="mt-1 w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white rounded-md p-2 focus:ring-2 focus:ring-blue-500"
          placeholder="Blog title"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300">Date</label>
        <input
          formControlName="date"
          type="date"
          class="mt-1 w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white rounded-md p-2 focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300">Category</label>
        <select
          formControlName="category"
          class="mt-1 w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white rounded-md p-2 focus:ring-2 focus:ring-blue-500"
        >
          <option value="" disabled selected>Select category</option>
          <option *ngFor="let cat of categoryOptions" [value]="cat">{{ cat }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300">Summary</label>
        <input
          formControlName="summary"
          type="text"
          class="mt-1 w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white rounded-md p-2 focus:ring-2 focus:ring-blue-500"
          placeholder="Short summary"
        />
      </div>
    </div>

    <div class="mt-4">
      <label class="block text-sm font-medium text-gray-600 dark:text-gray-300">Content (Optional)</label>
      <textarea
        formControlName="content"
        rows="4"
        class="mt-1 w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white rounded-md p-2 focus:ring-2 focus:ring-blue-500"
        placeholder="Full blog content..."
      ></textarea>
    </div>

    <div class="mt-6 flex gap-3">
      <button
        type="submit"
        [disabled]="blogForm.invalid"
        class="bg-blue-600 dark:bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-700 dark:hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed transition"
      >
        {{ editingBlogId ? 'Update Blog' : 'Post Blog' }}
      </button>
      <button
        type="button"
        *ngIf="editingBlogId"
        (click)="cancelEdit()"
        class="bg-gray-300 dark:bg-gray-600 text-gray-700 dark:text-gray-200 px-4 py-2 rounded hover:bg-gray-400 dark:hover:bg-gray-500 transition"
      >
        Cancel
      </button>
    </div>
  </form>

  <!-- Blog List -->
  <div class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 sm:gap-4">
    <div
      *ngFor="let blog of blogs"
      class="bg-white dark:bg-gray-800 border-l-4 border-blue-600 dark:border-blue-500 rounded-lg shadow p-4 relative"
    >
      <h3 class="text-lg font-semibold text-gray-800 dark:text-white">{{ blog.title }}</h3>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-1">Date: {{ blog.date | date: 'mediumDate' }}</p>
      <p class="text-gray-600 dark:text-gray-300 mb-2">{{ blog.summary }}</p>
      <p class="text-xs inline-block bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 px-2 py-1 rounded-full mb-3">
        {{ blog.category }}
      </p>

      <div class="flex justify-between items-center">
        <button
          (click)="editBlog(blog)"
          class="text-sm text-blue-600 dark:text-blue-400 hover:underline"
        >
           Edit
        </button>
        <button
          (click)="deleteBlog(blog._id)"
          class="text-sm text-red-600 dark:text-red-400 hover:underline"
        >
           Delete
        </button>
      </div>
    </div>
  </div>
</div>
