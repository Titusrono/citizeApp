<div class="moderator-container">
  <!-- Header -->
  <div class="header-section">
    <h1>Moderator Management</h1>
    <button class="btn-add" (click)="openModal()">
      ➕ Add New Moderator
    </button>
  </div>

  <!-- Success/Error Messages -->
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>

  <!-- Moderators List -->
  <div class="list-section">
    <div *ngIf="items.length === 0" class="no-data">
      No moderators found.
    </div>

    <table *ngIf="items.length > 0" class="items-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of items">
          <td>{{ item.name }}</td>
          <td>{{ item.email }}</td>
          <td><span class="role-badge">{{ item.role }}</span></td>
          <td><span class="status-badge" [ngClass]="'status-' + item.status">{{ item.status }}</span></td>
          <td>
            <button class="btn-sm btn-edit" (click)="onEdit(item)">Edit</button>
            <button class="btn-sm btn-delete" (click)="onDelete(item.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal Form -->
  <div *ngIf="showModal" class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ isEditing ? 'Edit Moderator' : 'Add New Moderator' }}</h2>
        <button class="btn-close" (click)="closeModal()">&times;</button>
      </div>

      <app-moderator-form
        [data]="currentData"
        [isEditing]="isEditing"
        [successMessage]="successMessage"
        [errorMessage]="errorMessage"
        [showModal]="showModal"
        (submit)="onFormSubmit($event)"
        (close)="closeModal()"
      ></app-moderator-form>
    </div>
  </div>
</div>
