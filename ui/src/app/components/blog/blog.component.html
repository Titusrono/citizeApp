<div class="container mx-auto px-3 sm:px-4 md:px-6 lg:px-10 py-4 sm:py-6">
  <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-blue-700 dark:text-blue-400 mb-3 sm:mb-4 text-center">
    Latest Blog Articles
  </h1>

  <!--  Category Filter Buttons -->
  <div class="flex flex-wrap justify-center gap-2 mb-3 sm:mb-4">
    <button
      (click)="selectedCategory = ''; applyCategoryFilter()"
      [ngClass]="{
        'bg-blue-600 text-white': selectedCategory === '',
        'bg-gray-100 text-gray-800': selectedCategory !== ''
      }"
      class="px-4 py-2 rounded-full text-sm font-medium border hover:bg-blue-500 hover:text-white transition"
    >
      All
    </button>

    <button
      *ngFor="let cat of categoryOptions"
      (click)="selectedCategory = cat; applyCategoryFilter()"
      [ngClass]="{
        'bg-blue-600 text-white': selectedCategory === cat,
        'bg-gray-100 text-gray-800': selectedCategory !== cat
      }"
      class="px-4 py-2 rounded-full text-sm font-medium border hover:bg-blue-500 hover:text-white transition"
    >
      {{ cat }}
    </button>
  </div>

  <!-- 📦 Blog Cards -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4 md:gap-6">
    <div
      *ngFor="let blog of filteredBlogs"
      class="bg-white dark:bg-gray-800 rounded-lg shadow-sm p-3 sm:p-4 border-l-4 border-transparent hover:border-blue-600 dark:hover:border-blue-400 hover:shadow-md transition duration-300 ease-in-out hover:bg-blue-50 dark:hover:bg-blue-900/30 cursor-pointer group"
      (click)="goToFullArticle(blog._id)"
    >
      <h2
        class="text-base sm:text-lg font-semibold text-gray-800 dark:text-gray-100 group-hover:text-blue-700 dark:group-hover:text-blue-400 transition-colors mb-2"
      >
        {{ blog.title }}
      </h2>

      <p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 mb-1 sm:mb-2">
        Date: {{ blog.date | date: 'mediumDate' }}
      </p>

      <p class="text-gray-700 dark:text-gray-300 text-xs sm:text-sm line-clamp-3 mb-2 sm:mb-3">
        {{ blog.summary }}
      </p>

      <div class="flex justify-between items-center">
        <button
          class="text-xs sm:text-sm text-blue-600 dark:text-blue-400 font-medium hover:underline"
          (click)="$event.stopPropagation(); goToFullArticle(blog._id)"
        >
          Read More 
        </button>

        <span
          class="text-xs uppercase font-semibold bg-blue-100 text-blue-700 px-2 py-1 rounded-full tracking-wide"
        >
          {{ blog.category }}
        </span>
      </div>
    </div>
  </div>
</div>
