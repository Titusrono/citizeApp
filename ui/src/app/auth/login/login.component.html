<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="w-full max-w-md p-8 bg-white rounded-xl shadow-lg flex flex-col items-center">
    <img src="/assets/logo.png" alt="Logo" class="w-16 h-16 mb-4" *ngIf="true">
    <h2 class="text-2xl font-semibold text-green-700 mb-2 text-center">Welcome Back</h2>
    <form (ngSubmit)="onSubmit(loginForm)" #loginForm="ngForm" class="w-full space-y-4 mt-2">
      <div>
        <label for="email" class="block mb-1 font-medium text-gray-700 text-sm">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          #emailInput="ngModel"
          placeholder="Enter your Gmail"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 text-gray-900"
        />
      </div>
      <div>
        <label for="password" class="block mb-1 font-medium text-gray-700 text-sm">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          minlength="6"
          #passwordInput="ngModel"
          placeholder="********"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 text-gray-900"
        />
      </div>
      <button
        type="submit"
        class="w-full bg-green-600 text-white font-semibold py-2 rounded-md hover:bg-green-700 transition"
      >
        Login
      </button>
      <button
        type="button"
        (click)="loginWithGoogle()"
        class="w-full flex items-center justify-center border border-gray-300 bg-white text-gray-700 rounded-md py-2 mt-2 hover:bg-gray-50 transition"
      >
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo" class="w-5 h-5 mr-2" />
        Login with Google
      </button>
      <div class="flex justify-between text-xs mt-2">
        <a routerLink="/forgot-password" class="text-green-600 hover:underline">Forgot Password?</a>
        <a routerLink="/register" class="text-green-600 hover:underline">Register</a>
      </div>
    </form>
    <div *ngIf="successMessage" class="mt-4 text-green-600 text-center animate-fade-in-out">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="mt-4 text-red-600 text-center animate-fade-in-out">{{ errorMessage }}</div>
    <div class="mt-6 text-xs text-gray-400 tracking-wide text-center">BAMA DAIRY</div>
  </div>
</div>
