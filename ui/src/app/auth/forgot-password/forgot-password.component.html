<div class="flex items-center justify-center min-h-screen bg-gray-100 dark:bg-gray-900">
  <div class="w-full max-w-md p-3 sm:p-4 md:p-6 bg-white dark:bg-gray-800 rounded-2xl shadow-md border border-gray-200 dark:border-gray-700">
    <h2 class="text-lg sm:text-xl font-semibold text-center text-gray-800 dark:text-white mb-3 sm:mb-4">
      Forgot Password
    </h2>

    <!-- Success message -->
    <div *ngIf="message" class="mb-3 p-2 sm:p-3 text-green-800 dark:text-green-400 bg-green-100 dark:bg-green-900/30 rounded-lg border border-green-300 dark:border-green-700 text-xs sm:text-sm">
      {{ message }}
    </div>

    <!-- Error message -->
    <div *ngIf="error" class="mb-3 p-2 sm:p-3 text-red-800 dark:text-red-400 bg-red-100 dark:bg-red-900/30 rounded-lg border border-red-300 dark:border-red-700 text-xs sm:text-sm">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" #forgotForm="ngForm">
      <div class="mb-3">
        <label for="email" class="block mb-1 text-xs sm:text-sm font-medium text-gray-700 dark:text-gray-300">
          Email address
        </label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-xs sm:text-sm"
        />
      </div>

      <button
        type="submit"
        [disabled]="forgotForm.invalid"
        class="w-full py-2 px-4 bg-blue-600 dark:bg-blue-500 hover:bg-blue-700 dark:hover:bg-blue-600 text-white font-semibold rounded-lg transition duration-300 text-xs sm:text-sm"
      >
        Send Reset Link
      </button>
    </form>

    <div class="mt-3 text-center">
      <a routerLink="/login" class="text-xs sm:text-sm text-blue-600 dark:text-blue-400 hover:underline">
        Back to Login
      </a>
    </div>
  </div>
</div>
