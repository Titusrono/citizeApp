<div *ngIf="isVisible" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4" (click)="onCancel()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md animation-scale-in overflow-hidden" (click)="$event.stopPropagation()">
    
    <!-- Header -->
    <div class="px-6 py-6 flex justify-between items-start gap-4" [ngClass]="isDangerous ? 'bg-linear-to-r from-red-50 to-rose-50 border-b-2 border-red-200' : 'bg-linear-to-r from-blue-50 to-cyan-50 border-b border-slate-200'">
      <h2 class="text-xl font-bold" [ngClass]="isDangerous ? 'text-red-900' : 'text-slate-900'">{{ title }}</h2>
      <button (click)="onCancel()" [disabled]="isLoading" class="text-slate-400 hover:text-slate-600 disabled:opacity-50 text-lg leading-none transition-colors">&times;</button>
    </div>

    <!-- Body -->
    <div class="px-6 py-6 bg-linear-to-b from-slate-50 to-white">
      <p class="text-slate-700 text-base leading-relaxed">{{ message }}</p>
    </div>

    <!-- Footer -->
    <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3">
      <button 
        (click)="onCancel()"
        [disabled]="isLoading"
        class="px-6 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-lg font-semibold text-sm hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        {{ cancelText }}
      </button>
      
      <button 
        (click)="onConfirm()"
        [disabled]="isLoading"
        [ngClass]="isDangerous 
          ? 'bg-linear-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700 text-white shadow-lg hover:shadow-xl' 
          : 'bg-linear-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white shadow-lg hover:shadow-xl'"
        class="px-6 py-2.5 rounded-lg font-semibold text-sm disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 hover:-translate-y-0.5 active:translate-y-0"
      >
        <span *ngIf="!isLoading">{{ confirmText }}</span>
        <span *ngIf="isLoading">Processing...</span>
      </button>
    </div>
  </div>
</div>
