<div *ngIf="isVisible" class="fixed inset-0 bg-linear-to-br from-black/40 to-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-5" (click)="onClose()">
  <div class="bg-linear-to-b from-white to-slate-50 rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden animation-scale-in md:max-h-[90vh] md:rounded-2xl" (click)="$event.stopPropagation()">
    
    <!-- Header -->
    <div class="px-8 py-7 bg-linear-to-r from-blue-900 to-blue-600 text-white flex justify-between items-center shadow-md">
      <div class="flex items-center gap-4">
        <h2 class="text-2xl font-bold tracking-tight">{{ title }}</h2>
      </div>
      <button (click)="onClose()" class="bg-white/15 border border-white/20 text-white w-9 h-9 flex items-center justify-center rounded-lg hover:bg-white/25 hover:border-white/30 transition-all duration-200 hover:rotate-90 title='Close'" style="line-height: 1;">&times;</button>
    </div>

    <!-- Body -->
    <div class="px-8 py-8 overflow-y-auto flex-1 flex flex-col gap-4 md:px-5 md:py-5 md:gap-3">
      <div *ngIf="fields.length === 0" class="flex items-center justify-center min-h-52 text-center">
        <p class="text-slate-400 text-base">No information to display</p>
      </div>

      <div *ngFor="let field of fields" class="bg-white border border-slate-200 rounded-xl p-6 transition-all duration-200 hover:border-slate-300 hover:shadow-md relative overflow-hidden group w-full" [ngClass]="{
        'bg-linear-to-br from-cyan-50 to-blue-50': field.type === 'date' || field.type === 'email',
        'bg-linear-to-br from-purple-50 to-pink-50': field.type === 'longtext'
      }">
        <!-- Left accent bar -->
        <div class="absolute left-0 top-0 w-1 h-full bg-linear-to-b from-blue-500 to-cyan-500 opacity-0 group-hover:opacity-100 transition-opacity duration-200"></div>

        <!-- Card Header -->
        <div class="flex items-center gap-3 mb-3">
          <span class="text-xs font-bold text-slate-600 uppercase tracking-wider">{{ field.label }}</span>
        </div>

        <!-- Card Content -->
        <div class="pl-7">
          <p *ngIf="field.type !== 'longtext'" class="text-slate-700 text-base leading-relaxed wrap-break-word font-medium">{{ getFieldValue(field.key) || '—' }}</p>
          <div *ngIf="field.type === 'longtext'" class="text-slate-600 text-sm leading-relaxed max-h-64 overflow-y-auto whitespace-pre-wrap wrap-break-word p-3 bg-slate-900/5 rounded-lg border-l-4 border-purple-500 custom-scrollbar">
            {{ getFieldValue(field.key) || '—' }}
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-8 py-5 bg-linear-to-b from-slate-100 to-slate-200 border-t border-slate-300 flex justify-end md:px-5">
      <button (click)="onClose()" class="px-7 py-3 bg-linear-to-r from-blue-600 to-blue-700 text-white rounded-lg font-semibold text-sm shadow-lg hover:shadow-xl hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 tracking-wide">Close</button>
    </div>
  </div>
</div>
